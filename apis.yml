name: Amazon FSx
description: >-
  Amazon FSx provides fully managed file systems with the native
  compatibility and feature sets for workloads that require shared file
  storage. FSx supports four widely-used file systems including NetApp ONTAP,
  OpenZFS, Windows File Server, and Lustre, delivering high performance and
  low latency access to data.
