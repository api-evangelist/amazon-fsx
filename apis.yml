apis:
- name: Amazon FSx API
  description: >-
    The Amazon FSx API enables programmatic access to create, manage, and
    monitor fully managed file systems. You can create file systems, manage
    backups, configure data repositories, create snapshots, and manage
    storage virtual machines across multiple file system types.
